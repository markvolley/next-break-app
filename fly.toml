# Fly.io config — https://fly.io/docs/reference/configuration/
#
# Deploy: install flyctl, run `fly launch` in this directory (it'll detect
# this file), then `fly volumes create next_break_data --size 1` and
# `fly deploy`. Set secrets with:
#   fly secrets set TRAVELPAYOUTS_TOKEN=your_token_here
# (TRAVELPAYOUTS_MARKER is not secret, so it's fine as a plain env var below.)

app = "next-break"
primary_region = "syd" # Sydney — closest to AU users

[build]

[env]
  PORT = "8080"
  DATA_FILE = "/data/data.json"
  TRAVELPAYOUTS_MARKER = "749343"

[mounts]
  source = "next_break_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
