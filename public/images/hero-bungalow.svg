<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1a20"/>
      <stop offset="50%" stop-color="#23324f"/>
      <stop offset="100%" stop-color="#e07a9a" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="sea2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a5f66"/>
      <stop offset="100%" stop-color="#0a2f34"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky2)"/>
  <circle cx="1250" cy="230" r="70" fill="#ffb648" opacity="0.85"/>
  <rect x="0" y="520" width="1600" height="380" fill="url(#sea2)"/>
  <g stroke="#7fe7db" stroke-opacity="0.22" stroke-width="3" fill="none">
