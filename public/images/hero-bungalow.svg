  </g>
  <g fill="#ffb648">
    <circle cx="365" cy="520" r="4"/>
    <circle cx="635" cy="505" r="4"/>
    <circle cx="927" cy="512" r="4"/>
    <circle cx="1190" cy="518" r="4"/>
  </g>
  <g fill="#0a2f34" opacity="0.35">
    <rect x="300" y="562" width="130" height="30"/>
    <rect x="560" y="558" width="150" height="34"/>
    <rect x="860" y="560" width="135" height="30"/>
    <rect x="1130" y="560" width="120" height="26"/>
