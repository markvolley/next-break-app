    <path d="M0 610 Q 200 598 400 610 T 800 610 T 1200 610 T 1600 610"/>
  </g>
  <!-- bungalows on stilts, connected by a walkway -->
  <line x1="260" y1="560" x2="1360" y2="560" stroke="#0a2226" stroke-width="10"/>
