    <line x1="680" y1="555" x2="680" y2="650" stroke="#08181c" stroke-width="8"/>
    <!-- bungalow 3 -->
    <rect x="860" y="465" width="135" height="92" rx="4"/>
    <path d="M850 465 L927 407 L1004 465 Z"/>
    <line x1="892" y1="557" x2="892" y2="642" stroke="#08181c" stroke-width="8"/>
    <line x1="962" y1="557" x2="962" y2="642" stroke="#08181c" stroke-width="8"/>
    <!-- bungalow 4 -->
    <rect x="1130" y="475" width="120" height="82" rx="4"/>
    <path d="M1122 475 L1190 422 L1258 475 Z"/>
    <line x1="1155" y1="557" x2="1155" y2="636" stroke="#08181c" stroke-width="8"/>
