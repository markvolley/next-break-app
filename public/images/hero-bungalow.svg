    <!-- bungalow 1 -->
    <rect x="300" y="470" width="130" height="90" rx="4"/>
    <path d="M290 470 L365 415 L440 470 Z"/>
    <line x1="330" y1="560" x2="330" y2="640" stroke="#08181c" stroke-width="8"/>
    <line x1="400" y1="560" x2="400" y2="640" stroke="#08181c" stroke-width="8"/>
    <!-- bungalow 2 -->
    <rect x="560" y="450" width="150" height="105" rx="4"/>
    <path d="M548 450 L635 388 L722 450 Z"/>
